<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#ffffff"/>

  <!-- ── APP CHROME ── -->
  <rect x="24" y="38" width="352" height="234" rx="12" stroke="#e5e7eb" stroke-width="1.5"/>
  <!-- title bar -->
  <line x1="24" y1="62" x2="376" y2="62" stroke="#f3f4f6" stroke-width="1"/>
  <circle cx="42" cy="50" r="4" fill="#e5e7eb"/>
  <circle cx="55" cy="50" r="4" fill="#e5e7eb"/>
  <circle cx="68" cy="50" r="4" fill="#e5e7eb"/>
  <text x="200" y="54" text-anchor="middle" font-family="'Inter',sans-serif" font-size="9" font-weight="600" fill="#9ca3af">YourApp · AI-Powered</text>

  <!-- ── USER MESSAGE ── -->
  <rect x="232" y="76" width="128" height="36" rx="10" fill="#ef5023"/>
  <rect x="244" y="86" width="72" height="7" rx="3.5" fill="white" opacity="0.9"/>
  <rect x="244" y="97" width="48" height="7" rx="3.5" fill="white" opacity="0.6"/>
  <!-- avatar -->
  <circle cx="376" cy="94" r="10" stroke="#e5e7eb" stroke-width="1.5"/>
  <circle cx="376" cy="91" r="3.5" fill="#d1d5db"/>
  <path d="M370,102 Q370,97 376,97 Q382,97 382,102" fill="#d1d5db"/>

  <!-- ── AI RESPONSE ── -->
  <!-- avatar -->
  <circle cx="40" cy="150" r="12" fill="#ef5023"/>
  <path d="M40,143 L41.8,149 L48,151 L41.8,153 L40,159 L38.2,153 L32,151 L38.2,149 Z" fill="white"/>
  <!-- bubble -->
  <rect x="60" y="130" width="220" height="46" rx="10" stroke="#e5e7eb" stroke-width="1.5"/>
  <rect x="72" y="141" width="140" height="7" rx="3.5" fill="#f3f4f6"/>
  <rect x="72" y="153" width="180" height="7" rx="3.5" fill="#f3f4f6"/>
  <rect x="72" y="165" width="96"  height="7" rx="3.5" fill="#f3f4f6"/>
  <!-- cursor -->
  <rect x="172" y="165" width="2" height="7" rx="1" fill="#ef5023"/>

  <!-- ── MSG 2 ── -->
  <rect x="244" y="190" width="112" height="28" rx="10" stroke="#e5e7eb" stroke-width="1.5"/>
  <rect x="254" y="199" width="72" height="6" rx="3" fill="#f3f4f6"/>
  <rect x="254" y="208" width="48" height="6" rx="3" fill="#f3f4f6"/>
  <circle cx="376" cy="204" r="10" stroke="#e5e7eb" stroke-width="1.5"/>
  <circle cx="376" cy="201" r="3.5" fill="#d1d5db"/>
  <path d="M370,211 Q370,206 376,206 Q382,206 382,211" fill="#d1d5db"/>

  <!-- ── CHIPS ── -->
  <rect x="60" y="234" width="68" height="24" rx="12" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="94" y="250" text-anchor="middle" font-family="'Inter',sans-serif" font-size="9" font-weight="500" fill="#6b7280">Summarise</text>

  <rect x="136" y="234" width="60" height="24" rx="12" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="166" y="250" text-anchor="middle" font-family="'Inter',sans-serif" font-size="9" font-weight="500" fill="#6b7280">Translate</text>

  <rect x="204" y="234" width="74" height="24" rx="12" fill="#ef5023"/>
  <text x="241" y="250" text-anchor="middle" font-family="'Inter',sans-serif" font-size="9" font-weight="700" fill="white">Generate ✦</text>

  <!-- ── INPUT ── -->
  <rect x="36" y="246" width="342" height="16" rx="8" stroke="#e5e7eb" stroke-width="1.5"/>
  <rect x="46" y="251" width="52" height="6" rx="3" fill="#f3f4f6"/>
  <circle cx="368" cy="254" r="6" fill="#ef5023"/>
  <polygon points="365,254 368,251 368,257" fill="white"/>

</svg>
