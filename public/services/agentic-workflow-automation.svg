  <line x1="357" y1="115" x2="363" y2="120" stroke="#d1d5db" stroke-width="1.3" stroke-linecap="round"/>
  <text x="360" y="138" text-anchor="middle" font-family="'Inter',sans-serif" font-size="8.5" font-weight="600" fill="#d1d5db">Notify</text>

