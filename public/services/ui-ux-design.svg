<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#ffffff"/>

  <!-- canvas bg -->
  <rect x="24" y="38" width="352" height="238" rx="12" stroke="#e5e7eb" stroke-width="1.5"/>

  <!-- toolbar left -->
  <rect x="24" y="38" width="32" height="238" rx="12" fill="#f9fafb"/>
  <rect x="24" y="100" width="32" height="116" rx="0" fill="#f9fafb"/>
  <!-- toolbar icons -->
  <rect x="32" y="54"  width="16" height="16" rx="4" stroke="#e5e7eb" stroke-width="1.5"/>
  <circle cx="40" cy="82" r="8" stroke="#e5e7eb" stroke-width="1.5"/>
  <line x1="33" y1="100" x2="47" y2="116" stroke="#ef5023" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="47" y1="100" x2="33" y2="116" stroke="#ef5023" stroke-width="1.8" stroke-linecap="round"/>
  <polygon points="40,126 33,140 47,140" stroke="#e5e7eb" stroke-width="1.5" stroke-linejoin="round"/>
  <circle cx="40" cy="158" r="6" fill="#ef5023"/>

  <!-- main canvas -->
  <!-- wireframe phone -->
  <rect x="72" y="54" width="76" height="134" rx="10" stroke="#e5e7eb" stroke-width="1.5"/>
  <rect x="80" y="66" width="60" height="110" rx="6" fill="#f9fafb"/>
  <rect x="96" y="58" width="28" height="4" rx="2" fill="#e5e7eb"/>
  <!-- wireframe content -->
  <rect x="86" y="74"  width="48" height="20" rx="4" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="86" y="100" width="48" height="5" rx="2.5" fill="#e5e7eb"/>
  <rect x="86" y="109" width="36" height="5" rx="2.5" fill="#e5e7eb"/>
  <rect x="86" y="122" width="28" height="14" rx="7" fill="#ef5023"/>
  <rect x="92" y="128" width="16" height="3" rx="1.5" fill="white" opacity="0.9"/>
  <!-- bottom nav -->
  <line x1="80" y1="154" x2="140" y2="154" stroke="#e5e7eb" stroke-width="1"/>
  <circle cx="96"  cy="163" r="4" fill="#e5e7eb"/>
  <circle cx="110" cy="163" r="4" fill="#ef5023"/>
  <circle cx="124" cy="163" r="4" fill="#e5e7eb"/>

  <!-- color palette -->
  <rect x="164" y="54" width="96" height="56" rx="8" stroke="#e5e7eb" stroke-width="1.5"/>
  <circle cx="182" cy="72" r="10" fill="#ef5023"/>
  <circle cx="206" cy="72" r="10" fill="#111111"/>
  <circle cx="230" cy="72" r="10" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
  <circle cx="182" cy="96" r="10" fill="#fff3ee" stroke="#e5e7eb" stroke-width="1"/>
  <circle cx="206" cy="96" r="10" fill="#6b7280"/>
  <circle cx="230" cy="96" r="10" fill="#e5e7eb"/>

  <!-- typography block -->
  <rect x="164" y="122" width="192" height="72" rx="8" stroke="#e5e7eb" stroke-width="1.5"/>
  <rect x="176" y="134" width="100" height="14" rx="4" fill="#111111" opacity="0.85"/>
  <rect x="176" y="154" width="160" height="7" rx="3.5" fill="#e5e7eb"/>
  <rect x="176" y="165" width="132" height="7" rx="3.5" fill="#e5e7eb"/>
  <rect x="176" y="176" width="88"  height="7" rx="3.5" fill="#f3f4f6"/>

  <!-- component card -->
  <rect x="164" y="206" width="192" height="56" rx="8" stroke="#ef5023" stroke-width="1.5"/>
  <rect x="176" y="218" width="72" height="10" rx="5" fill="#ef5023"/>
  <rect x="176" y="232" width="96" height="6" rx="3" fill="#e5e7eb"/>
  <rect x="176" y="242" width="64" height="6" rx="3" fill="#e5e7eb"/>
  <rect x="300" y="222" width="44" height="22" rx="8" fill="#ef5023" opacity="0.1" stroke="#ef5023" stroke-width="1"/>
  <text x="322" y="237" text-anchor="middle" font-family="'Inter',sans-serif" font-size="8" font-weight="600" fill="#ef5023">UI Kit</text>

  <!-- ruler annotation -->
  <line x1="72"  y1="200" x2="72"  y2="214" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="148" y1="200" x2="148" y2="214" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="72"  y1="207" x2="148" y2="207" stroke="#e5e7eb" stroke-width="1"/>
  <text x="110" y="204" text-anchor="middle" font-family="'Inter',sans-serif" font-size="7" fill="#9ca3af">76pt</text>

</svg>
