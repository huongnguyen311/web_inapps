<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#ffffff"/>

  <!-- timeline spine -->
  <line x1="60" y1="40" x2="60" y2="268" stroke="#e5e7eb" stroke-width="2"/>
  <!-- filled progress -->
  <line x1="60" y1="40" x2="60" y2="200" stroke="#ef5023" stroke-width="2"/>

  <!-- milestone 1: Idea — done -->
  <circle cx="60" cy="62" r="10" fill="#ef5023"/>
  <polyline points="53,62 58,68 68,55" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <line x1="70" y1="62" x2="88" y2="62" stroke="#ef5023" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="88" y="50" width="148" height="28" rx="6" stroke="#ef5023" stroke-width="1.5"/>
  <text x="100" y="62" font-family="'Inter',sans-serif" font-size="8.5" font-weight="700" fill="#111111">Idea &amp; Scope</text>
  <text x="100" y="72" font-family="'Inter',sans-serif" font-size="7.5" fill="#9ca3af">Define requirements</text>

  <!-- milestone 2: Design — done -->
  <circle cx="60" cy="120" r="10" fill="#ef5023"/>
  <polyline points="53,120 58,126 68,113" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <line x1="70" y1="120" x2="88" y2="120" stroke="#ef5023" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="88" y="108" width="148" height="28" rx="6" stroke="#ef5023" stroke-width="1.5"/>
  <text x="100" y="120" font-family="'Inter',sans-serif" font-size="8.5" font-weight="700" fill="#111111">Design &amp; Prototype</text>
  <text x="100" y="130" font-family="'Inter',sans-serif" font-size="7.5" fill="#9ca3af">Wireframes · UI</text>

  <!-- milestone 3: Build — active -->
  <circle cx="60" cy="184" r="12" fill="#ef5023"/>
  <polygon points="54,178 54,190 67,184" fill="white"/>
  <line x1="72" y1="184" x2="88" y2="184" stroke="#ef5023" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="88" y="168" width="148" height="34" rx="6" fill="#ef5023"/>
  <text x="100" y="182" font-family="'Inter',sans-serif" font-size="8.5" font-weight="700" fill="white">Build MVP</text>
  <text x="100" y="194" font-family="'Inter',sans-serif" font-size="7.5" fill="white" opacity="0.8">In progress · Week 3/6</text>

  <!-- milestone 4: Launch — pending -->
  <circle cx="60" cy="252" r="10" stroke="#e5e7eb" stroke-width="1.5"/>
  <line x1="70" y1="252" x2="88" y2="252" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="88" y="240" width="148" height="28" rx="6" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="100" y="252" font-family="'Inter',sans-serif" font-size="8.5" font-weight="600" fill="#d1d5db">Launch &amp; Validate</text>
  <text x="100" y="262" font-family="'Inter',sans-serif" font-size="7.5" fill="#d1d5db">Ship · Measure</text>

  <!-- timeline badge -->
  <rect x="264" y="40" width="112" height="228" rx="12" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="320" y="70" text-anchor="middle" font-family="'Inter',sans-serif" font-size="9" font-weight="600" fill="#9ca3af">Timeline</text>
  <line x1="272" y1="80" x2="368" y2="80" stroke="#f3f4f6" stroke-width="1"/>
  <text x="320" y="122" text-anchor="middle" font-family="'Inter',sans-serif" font-size="44" font-weight="800" fill="#ef5023">6</text>
  <text x="320" y="140" text-anchor="middle" font-family="'Inter',sans-serif" font-size="9" fill="#9ca3af">weeks to ship</text>
  <line x1="272" y1="152" x2="368" y2="152" stroke="#f3f4f6" stroke-width="1"/>
  <text x="320" y="182" text-anchor="middle" font-family="'Inter',sans-serif" font-size="30" font-weight="800" fill="#111111">MVP</text>
  <text x="320" y="200" text-anchor="middle" font-family="'Inter',sans-serif" font-size="8" fill="#9ca3af">shipped &amp; live</text>
  <line x1="272" y1="212" x2="368" y2="212" stroke="#f3f4f6" stroke-width="1"/>
  <rect x="278" y="222" width="84" height="26" rx="13" fill="#ef5023"/>
  <text x="320" y="239" text-anchor="middle" font-family="'Inter',sans-serif" font-size="8.5" font-weight="700" fill="white">Ship Fast</text>
</svg>
