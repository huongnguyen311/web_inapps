  <text x="118" y="87" font-family="monospace" font-size="7" fill="#ff7b72">import</text>
  <text x="148" y="87" font-family="monospace" font-size="7" fill="#ffa657"> { useState }</text>
  <!-- Line 3 blank -->
  <!-- Line 4 highlighted -->
  <rect x="112" y="99" width="144" height="10" rx="2" fill="#f97316" opacity="0.08"/>
  <text x="118" y="107" font-family="monospace" font-size="7" fill="#79c0ff">export default</text>
  <text x="189" y="107" font-family="monospace" font-size="7" fill="#d2a8ff"> function</text>
  <text x="228" y="107" font-family="monospace" font-size="7" fill="#e3b341"> App</text>
  <text x="245" y="107" font-family="monospace" font-size="7" fill="#c9d1d9">() {'{'}  </text>
  <!-- Cursor on this line -->
  <rect x="251" y="100" width="2" height="9" rx="1" fill="#58a6ff" opacity="0.9"/>

  <!-- Line 5 -->
  <text x="126" y="117" font-family="monospace" font-size="7" fill="#79c0ff">  const</text>
  <text x="157" y="117" font-family="monospace" font-size="7" fill="#ffa657"> [count, setCount]</text>
  <!-- Line 6 -->
  <text x="126" y="127" font-family="monospace" font-size="7" fill="#c9d1d9">    = </text>
  <text x="145" y="127" font-family="monospace" font-size="7" fill="#d2a8ff">useState</text>
  <text x="183" y="127" font-family="monospace" font-size="7" fill="#a5d6ff">(0)</text>
  <!-- Line 7 -->
  <text x="118" y="137" font-family="monospace" font-size="7" fill="#c9d1d9">  </text>
  <text x="126" y="137" font-family="monospace" font-size="7" fill="#79c0ff">return</text>
  <!-- Line 8 -->
  <text x="126" y="147" font-family="monospace" font-size="7" fill="#7ee787">    &lt;div</text>
  <text x="158" y="147" font-family="monospace" font-size="7" fill="#79c0ff"> className</text>
  <text x="206" y="147" font-family="monospace" font-size="7" fill="#c9d1d9">=</text>
  <text x="212" y="147" font-family="monospace" font-size="7" fill="#a5d6ff">"app"</text>
  <!-- Line 9 -->
  <text x="134" y="157" font-family="monospace" font-size="7" fill="#7ee787">      &lt;button</text>
  <text x="184" y="157" font-family="monospace" font-size="7" fill="#79c0ff"> onClick</text>
  <!-- Line 10 -->
  <text x="134" y="167" font-family="monospace" font-size="7" fill="#c9d1d9">        {count}</text>

