  <text x="148" y="77" font-family="monospace" font-size="7" fill="#c9d1d9"> React </text>
  <text x="172" y="77" font-family="monospace" font-size="7" fill="#ff7b72">from</text>
  <text x="192" y="77" font-family="monospace" font-size="7" fill="#a5d6ff"> 'react'</text>
