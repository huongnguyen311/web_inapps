  <path d="M294 188 Q302 188 302 196 Q302 202 294 202" stroke="#30363d" stroke-width="2" fill="none" stroke-linecap="round"/>
  <rect x="278" y="184" width="14" height="4" rx="2" fill="#f97316" opacity="0.6"/>
