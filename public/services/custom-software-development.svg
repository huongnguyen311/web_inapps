  <rect x="104" y="200" width="8" height="5" rx="1" fill="#30363d"/>
  <rect x="114" y="200" width="8" height="5" rx="1" fill="#30363d"/>
  <rect x="124" y="200" width="8" height="5" rx="1" fill="#30363d"/>
  <rect x="134" y="200" width="8" height="5" rx="1" fill="#30363d"/>
  <rect x="144" y="200" width="8" height="5" rx="1" fill="#30363d"/>
  <rect x="154" y="200" width="8" height="5" rx="1" fill="#30363d"/>
  <rect x="164" y="200" width="8" height="5" rx="1" fill="#30363d"/>
  <rect x="174" y="200" width="8" height="5" rx="1" fill="#30363d"/>
  <rect x="184" y="200" width="10" height="5" rx="1" fill="#30363d"/>
  <!-- Row 2 -->
  <rect x="96" y="207" width="8" height="5" rx="1" fill="#30363d"/>
  <rect x="106" y="207" width="8" height="5" rx="1" fill="#58a6ff" opacity="0.4"/>
  <rect x="116" y="207" width="8" height="5" rx="1" fill="#30363d"/>
