<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#ffffff"/>

  <!-- CI/CD pipeline track -->
  <line x1="40" y1="120" x2="360" y2="120" stroke="#e5e7eb" stroke-width="2"/>
  <!-- progress -->
  <line x1="40" y1="120" x2="280" y2="120" stroke="#ef5023" stroke-width="2"/>

  <!-- stage: Code -->
  <circle cx="72" cy="120" r="20" fill="#ef5023"/>
  <rect x="64" y="113" width="16" height="14" rx="3" stroke="white" stroke-width="1.5"/>
  <line x1="67" y1="118" x2="79" y2="118" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="67" y1="122" x2="75" y2="122" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
  <text x="72" y="152" text-anchor="middle" font-family="'Inter',sans-serif" font-size="8.5" font-weight="600" fill="#6b7280">Code</text>

  <!-- stage: Build -->
  <circle cx="152" cy="120" r="20" fill="#ef5023"/>
  <polygon points="145,113 145,127 159,120" fill="white"/>
  <text x="152" y="152" text-anchor="middle" font-family="'Inter',sans-serif" font-size="8.5" font-weight="600" fill="#6b7280">Build</text>

  <!-- stage: Test -->
  <circle cx="232" cy="120" r="20" fill="#ef5023"/>
  <polyline points="223,120 229,127 241,113" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="232" y="152" text-anchor="middle" font-family="'Inter',sans-serif" font-size="8.5" font-weight="600" fill="#6b7280">Test</text>

  <!-- stage: Deploy (active ring) -->
  <circle cx="312" cy="120" r="24" stroke="#ef5023" stroke-width="2"/>
  <circle cx="312" cy="120" r="16" stroke="#e5e7eb" stroke-width="1.5"/>
  <!-- cloud up arrow -->
  <path d="M304,122 Q304,114 312,114 Q320,114 320,122" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <line x1="312" y1="122" x2="312" y2="132" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="307,126 312,120 317,126" stroke="#9ca3af" stroke-width="1.5" stroke-linejoin="round" fill="none"/>
  <text x="312" y="158" text-anchor="middle" font-family="'Inter',sans-serif" font-size="8.5" font-weight="600" fill="#9ca3af">Deploy</text>

  <!-- infra cards -->
  <rect x="40" y="178" width="72" height="68" rx="10" stroke="#e5e7eb" stroke-width="1.5"/>
  <!-- cloud icon -->
  <ellipse cx="76" cy="202" rx="18" ry="11" stroke="#e5e7eb" stroke-width="1.5"/>
  <ellipse cx="64" cy="206" rx="10" ry="7" stroke="#e5e7eb" stroke-width="1.5"/>
  <ellipse cx="88" cy="206" rx="10" ry="7" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="76" y="232" text-anchor="middle" font-family="'Inter',sans-serif" font-size="8" font-weight="600" fill="#9ca3af">Cloud</text>

  <rect x="126" y="178" width="72" height="68" rx="10" stroke="#e5e7eb" stroke-width="1.5"/>
  <rect x="144" y="196" width="36" height="6" rx="3" fill="#e5e7eb"/>
  <rect x="144" y="206" width="36" height="6" rx="3" fill="#e5e7eb"/>
  <rect x="144" y="216" width="28" height="6" rx="3" fill="#e5e7eb"/>
  <text x="162" y="232" text-anchor="middle" font-family="'Inter',sans-serif" font-size="8" font-weight="600" fill="#9ca3af">IaC</text>

  <rect x="212" y="178" width="72" height="68" rx="10" fill="#ef5023"/>
  <circle cx="248" cy="204" r="14" stroke="white" stroke-width="1.5"/>
  <polyline points="240,204 246,210 257,197" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="248" y="232" text-anchor="middle" font-family="'Inter',sans-serif" font-size="8" font-weight="700" fill="white">Live ✓</text>

  <rect x="298" y="178" width="72" height="68" rx="10" stroke="#e5e7eb" stroke-width="1.5"/>
  <!-- monitor icon -->
  <rect x="310" y="196" width="48" height="30" rx="4" stroke="#e5e7eb" stroke-width="1.5"/>
  <line x1="330" y1="226" x2="326" y2="232" stroke="#e5e7eb" stroke-width="1.5"/>
  <line x1="350" y1="226" x2="354" y2="232" stroke="#e5e7eb" stroke-width="1.5"/>
  <line x1="322" y1="233" x2="358" y2="233" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="334" y="244" text-anchor="middle" font-family="'Inter',sans-serif" font-size="8" font-weight="600" fill="#9ca3af">Monitor</text>

</svg>
