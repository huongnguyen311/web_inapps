<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#ffffff"/>

  <!-- gantt header -->
  <rect x="24" y="38" width="352" height="238" rx="12" stroke="#e5e7eb" stroke-width="1.5"/>
  <rect x="24" y="38" width="352" height="32" rx="12" fill="#f9fafb"/>
  <rect x="24" y="56" width="352" height="14" fill="#f9fafb"/>
  <text x="36"  y="58" font-family="'Inter',sans-serif" font-size="8" font-weight="600" fill="#9ca3af">Task</text>
  <text x="160" y="58" font-family="'Inter',sans-serif" font-size="8" font-weight="600" fill="#9ca3af">Week 1</text>
  <text x="218" y="58" font-family="'Inter',sans-serif" font-size="8" font-weight="600" fill="#9ca3af">Week 2</text>
  <text x="276" y="58" font-family="'Inter',sans-serif" font-size="8" font-weight="600" fill="#9ca3af">Week 3</text>
  <text x="334" y="58" font-family="'Inter',sans-serif" font-size="8" font-weight="600" fill="#9ca3af">Week 4</text>
  <line x1="24" y1="70" x2="376" y2="70" stroke="#e5e7eb" stroke-width="1"/>
  <!-- vertical week lines -->
  <line x1="152" y1="70" x2="152" y2="276" stroke="#f3f4f6" stroke-width="1"/>
  <line x1="210" y1="70" x2="210" y2="276" stroke="#f3f4f6" stroke-width="1"/>
  <line x1="268" y1="70" x2="268" y2="276" stroke="#f3f4f6" stroke-width="1"/>
  <line x1="326" y1="70" x2="326" y2="276" stroke="#f3f4f6" stroke-width="1"/>

  <!-- row 1: Discovery — done -->
  <line x1="24" y1="98" x2="376" y2="98" stroke="#f9fafb" stroke-width="1"/>
  <text x="36" y="90" font-family="'Inter',sans-serif" font-size="8.5" font-weight="600" fill="#111111">Discovery</text>
  <rect x="154" y="78" width="112" height="14" rx="7" fill="#ef5023"/>
  <polyline points="162,85 168,91 180,79" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- row 2: Design — done -->
  <line x1="24" y1="128" x2="376" y2="128" stroke="#f9fafb" stroke-width="1"/>
  <text x="36" y="120" font-family="'Inter',sans-serif" font-size="8.5" font-weight="600" fill="#111111">Design</text>
  <rect x="154" y="108" width="168" height="14" rx="7" fill="#ef5023"/>
  <polyline points="162,115 168,121 180,109" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- row 3: Development — active -->
  <line x1="24" y1="158" x2="376" y2="158" stroke="#f9fafb" stroke-width="1"/>
  <text x="36" y="150" font-family="'Inter',sans-serif" font-size="8.5" font-weight="700" fill="#111111">Development</text>
  <rect x="154" y="138" width="226" height="14" rx="7" stroke="#ef5023" stroke-width="1.5"/>
  <!-- partial fill -->
  <rect x="154" y="138" width="130" height="14" rx="7" fill="#ef5023"/>
  <!-- active indicator -->
  <circle cx="284" cy="145" r="5" fill="#ef5023"/>
  <circle cx="284" cy="145" r="9" stroke="#ef5023" stroke-width="1" stroke-opacity="0.3"/>

  <!-- row 4: Testing — pending -->
  <line x1="24" y1="188" x2="376" y2="188" stroke="#f9fafb" stroke-width="1"/>
  <text x="36" y="180" font-family="'Inter',sans-serif" font-size="8.5" font-weight="600" fill="#9ca3af">QA &amp; Testing</text>
  <rect x="270" y="168" width="84" height="14" rx="7" fill="#f3f4f6"/>

  <!-- row 5: Launch — pending -->
  <text x="36" y="210" font-family="'Inter',sans-serif" font-size="8.5" font-weight="600" fill="#9ca3af">Launch</text>
  <rect x="328" y="198" width="36" height="14" rx="7" fill="#f3f4f6"/>

  <!-- bottom strip -->
  <line x1="24" y1="228" x2="376" y2="228" stroke="#e5e7eb" stroke-width="1"/>
  <text x="36"  y="248" font-family="'Inter',sans-serif" font-size="8" fill="#9ca3af">Fixed scope</text>
  <text x="36"  y="262" font-family="'Inter',sans-serif" font-size="8" fill="#9ca3af">Clear milestones</text>
  <rect x="258" y="236" width="106" height="28" rx="8" fill="#ef5023"/>
  <text x="311" y="250" text-anchor="middle" font-family="'Inter',sans-serif" font-size="8.5" font-weight="700" fill="white">End-to-End</text>
  <text x="311" y="260" text-anchor="middle" font-family="'Inter',sans-serif" font-size="7.5" fill="white" opacity="0.8">Managed by us</text>

</svg>
